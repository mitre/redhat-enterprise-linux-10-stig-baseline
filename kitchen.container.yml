---
# see: https://kitchen.ci/docs/drivers/dokken/

provisioner:
  name: dummy

driver:
  name: dokken
  pull_chef_image: false
  chef_image: artifacts.mitre.org/docker-remote/chef/chef
  pull_platform_image: false

transport:
  name: dokken

platforms:
  - name: ubi10

suites:
  - name: vanilla
    driver:
      image: <%= ENV['VANILLA_CONTAINER_IMAGE'] || "registry1.dso.mil/ironbank/redhat/ubi/ubi10:10.2" %>
    verifier:
      input_files:
        - container.vanilla.inputs.yml
  - name: hardened
    driver:
      image: <%= ENV['HARDENED_CONTAINER_IMAGE'] || "registry1.dso.mil/ironbank/redhat/ubi/ubi10:10.2" %>
      # creds_file: ./creds.json
    verifier:
      input_files:
        - container.hardened.inputs.yml
